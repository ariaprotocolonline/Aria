<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ARIA — Autonomous RWA Intelligence</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
      #aria-splash {
        position: fixed;
        inset: 0;
        background: #0F1110;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        transition: opacity 0.4s ease;
      }
      #aria-splash.fade-out { opacity: 0; pointer-events: none; }
      #aria-splash-logo {
        font-family: Georgia, 'Times New Roman', serif;
        font-size: 3.5rem;
        font-weight: 700;
        color: #85B285;
        letter-spacing: 0.15em;
        margin-bottom: 1.5rem;
      }
      #aria-splash-bar {
        width: 48px;
        height: 2px;
        background: #85B285;
        border-radius: 2px;
        animation: aria-pulse 1.4s ease-in-out infinite;
      }
      #aria-splash-label {
        margin-top: 1.25rem;
        color: #A3A8A4;
        font-family: Arial, sans-serif;
        font-size: 0.65rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }
      @keyframes aria-pulse {
        0%, 100% { opacity: 0.35; transform: scaleX(1); }
        50%       { opacity: 1;    transform: scaleX(1.8); }
      }
    </style>
  </head>
  <body class="bg-bg text-text-primary font-sans antialiased">
    <!-- Splash shown instantly before React boots -->
    <div id="aria-splash">
      <div id="aria-splash-logo">ARIA</div>
      <div id="aria-splash-bar"></div>
      <p id="aria-splash-label">Initializing Agent</p>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.__hideSplash = function () {
        var el = document.getElementById('aria-splash');
        if (!el) return;
        el.classList.add('fade-out');
        setTimeout(function () { el.remove(); }, 420);
      };
    </script>
  </body>
</html>
