<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ARIA — Autonomous RWA Intelligence</title>
    <!-- Google Fonts: design system fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
      #aria-splash {
        position: fixed;
        inset: 0;
        background: #07080a;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        transition: opacity 0.4s ease;
      }
      #aria-splash.fade-out { opacity: 0; pointer-events: none; }
      #aria-splash-logo {
        font-family: 'Geist', system-ui, sans-serif;
        font-size: 2rem;
        font-weight: 400;
        color: #75e5b0;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        margin-bottom: 1.5rem;
      }
      #aria-splash-bar {
        width: 48px;
        height: 2px;
        background: #75e5b0;
        border-radius: 2px;
        animation: aria-pulse 1.4s ease-in-out infinite;
      }
      #aria-splash-label {
        margin-top: 1.25rem;
        color: #7a7d83;
        font-family: 'Geist Mono', monospace;
        font-size: 0.6rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }
      @keyframes aria-pulse {
        0%, 100% { opacity: 0.35; transform: scaleX(1); }
        50%       { opacity: 1;    transform: scaleX(1.8); }
      }
    </style>
  </head>
  <body>
    <!-- Splash shown instantly before React boots -->
    <div id="aria-splash">
      <div id="aria-splash-logo">ARIA</div>
      <div id="aria-splash-bar"></div>
      <p id="aria-splash-label">Initializing Agent</p>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.__hideSplash = function () {
        var el = document.getElementById('aria-splash');
        if (!el) return;
        el.classList.add('fade-out');
        setTimeout(function () { el.remove(); }, 420);
      };
    </script>
  </body>
</html>
