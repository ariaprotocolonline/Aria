# ── Global security ───────────────────────────────────────────────────────────
server_tokens off;

# ── Rate limit zones ──────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api:10m  rate=30r/m;
limit_req_zone $binary_remote_addr zone=feed:10m rate=60r/m;

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name ariaprotocol.online www.ariaprotocol.online;
    return 301 https://$host$request_uri;
}

# ── HTTPS server ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name ariaprotocol.online www.ariaprotocol.online;

    ssl_certificate     /etc/letsencrypt/live/ariaprotocol.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ariaprotocol.online/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers on;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # CSP: unsafe-inline is required for Vite's production build (inline style/script chunks).
    # wss: is scoped to mantle RPC WebSocket endpoints only — no open wildcard.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://rpc.mantle.xyz wss://rpc.mantle.xyz https://rpc.sepolia.mantle.xyz wss://rpc.sepolia.mantle.xyz https://mantle-sepolia.drpc.org https://coins.llama.fi https://api.coingecko.com https://eth-mainnet.g.alchemy.com https://*.walletconnect.com https://*.walletconnect.org wss://*.walletconnect.com wss://*.walletconnect.org https://api.web3modal.com https://*.web3modal.com https://pulse.walletconnect.org https://api.web3modal.com https://metamask-sdk-socket.metaswap.codefi.network wss://metamask-sdk-socket.metaswap.codefi.network; font-src 'self' data: https://fonts.gstatic.com; frame-src 'none';" always;

    # ── Connection timeouts — prevent slow-connection attacks ─────────────────
    keepalive_timeout   65;
    client_body_timeout 12;

    # ── Request size limit ────────────────────────────────────────────────────
    client_max_body_size 64k;

    # ── Proxy to aria-server (Claude API proxy + security layer) ──────────────
    location /api {
        limit_req zone=api burst=10 nodelay;

        proxy_pass         http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        # Strip X-Forwarded-For to prevent IP spoofing of rate limits
        proxy_set_header   X-Forwarded-For   "";
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;
    }

    # ── Block internal /tg/notify from the public internet ───────────────────
    # /notify is called only by aria-agent over the loopback interface; it must
    # never be reachable from outside. The INTERNAL_SECRET provides a second
    # defence layer, but denying at nginx level is more robust.
    location = /tg/notify {
        deny all;
    }

    # ── Proxy to aria-tgbot (public API + Telegram webhook) ──────────────────
    location /tg/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass         http://127.0.0.1:3003/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        # Strip X-Forwarded-For to match the API proxy and prevent IP spoofing
        proxy_set_header   X-Forwarded-For   "";
        proxy_read_timeout 15s;
    }

    location /telegram/webhook {
        proxy_pass         http://127.0.0.1:3003/webhook;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_read_timeout 10s;
    }

    # ── Proxy to aria-agent feed server (public read-only) ───────────────────
    location /feed {
        limit_req zone=feed burst=20 nodelay;

        # Only GET/OPTIONS are publicly accessible
        limit_except GET OPTIONS {
            deny all;
        }

        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Forwarded-For "";
        proxy_read_timeout 10s;
    }

    # ── Block direct access to internal ports ─────────────────────────────────
    # Ports 3001 and 3002 must be firewalled at the OS level (ufw/iptables):
    #   ufw deny 3001
    #   ufw deny 3002

    # ── Serve dashboard static build ──────────────────────────────────────────
    location / {
        root      /var/www/aria-dashboard;
        try_files $uri $uri/ /index.html;

        # Cache fingerprinted static assets long-term
        location ~* \.(js|css|png|svg|ico|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
