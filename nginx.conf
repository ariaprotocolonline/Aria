# ── Global security ───────────────────────────────────────────────────────────
server_tokens off;

# ── Rate limit zones ──────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api:10m  rate=30r/m;
limit_req_zone $binary_remote_addr zone=feed:10m rate=60r/m;

server {
    listen 80;
    server_name _;

    # In production: redirect HTTP → HTTPS and uncomment the HTTPS block below.
    # return 301 https://$host$request_uri;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://rpc.mantle.xyz https://rpc.sepolia.mantle.xyz https://mantle-sepolia.drpc.org https://api.anthropic.com wss:; font-src 'self' data:;" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Request size limit ────────────────────────────────────────────────────
    client_max_body_size 64k;

    # ── Proxy to aria-server (Claude API proxy + security layer) ──────────────
    location /api {
        limit_req zone=api burst=10 nodelay;

        proxy_pass         http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        # Strip X-Forwarded-For to prevent IP spoofing of rate limits
        proxy_set_header   X-Forwarded-For   "";
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;
    }

    # ── Proxy to aria-agent feed server (public read-only) ───────────────────
    location /feed {
        limit_req zone=feed burst=20 nodelay;

        # Only GET/OPTIONS are publicly accessible — DELETE /memory is internal only
        limit_except GET OPTIONS {
            deny all;
        }

        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Forwarded-For "";
        proxy_read_timeout 10s;
    }

    # ── Block direct access to internal ports ─────────────────────────────────
    # Ports 3001 and 3002 must be firewalled at the OS level (ufw/iptables).
    # nginx cannot block direct TCP connections — this is a reminder only.

    # ── Serve dashboard static build ──────────────────────────────────────────
    location / {
        root      /var/www/aria-dashboard;
        try_files $uri $uri/ /index.html;

        # Cache fingerprinted static assets long-term
        location ~* \.(js|css|png|svg|ico|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}

